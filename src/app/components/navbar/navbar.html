<nav class="navbar">
    <div class="nav-inner">

        <a class="nav-brand" href="#">
            <div class="brand-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="22" height="22" fill="none">
                    <ellipse cx="32" cy="20" rx="14" ry="16" fill="#fff" opacity="0.9" />
                    <path d="M18 20 Q20 44 32 56 Q44 44 46 20Z" fill="#fff" opacity="0.75" />
                    <circle cx="26" cy="16" r="4" fill="#F7C59F" opacity="0.8" />
                    <circle cx="38" cy="13" r="3" fill="#FDEBD0" opacity="0.7" />
                </svg>
            </div>
            <span class="brand-name">SilverSpoon</span>
        </a>

        <!-- User Profile Section (shown when logged in) -->
        <div class="user-profile" *ngIf="user" (click)="toggleDropdown()" [class.open]="dropdownOpen">
            <div class="avatar">{{ userInitial }}</div>
            <span class="user-name">{{ user.name }}</span>
            <svg class="chevron" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"></polyline>
            </svg>

            <!-- Dropdown Menu -->
            <div class="dropdown-menu" (click)="$event.stopPropagation()">
                <div class="dropdown-header">
                    <div class="dropdown-avatar">{{ userInitial }}</div>
                    <div class="dropdown-user-info">
                        <span class="dropdown-name">{{ user.name }}</span>
                    </div>
                </div>
                <div class="dropdown-divider"></div>
                <a class="dropdown-item" (click)="onMyProfile()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    My Profile
                </a>
                <a class="dropdown-item" (click)="onMyOrders()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <path d="M16 10a4 4 0 0 1-8 0"></path>
                    </svg>
                    Track Order
                </a>
                <div class="dropdown-divider"></div>
                <a class="dropdown-item logout" (click)="onLogout()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    Log out
                </a>
            </div>
        </div>

        <!-- Action buttons (shown when NOT logged in) -->
        <div class="nav-actions" *ngIf="!user">
            <button (click)="onLogin()" class="btn-ghost">Log in</button>
            <button (click)="onSignup()" class="btn-solid">Sign up</button>
        </div>

    </div>
</nav>
