<div class="signup-page">
    <div class="form-wrap">
        <div class="form-header">
            <button class="back-btn" onclick="history.back()">
                <span class="material-icons">arrow_back</span>
            </button>

            <h1>Create account</h1>
            <p>Already have one? <a routerLink="/login">Sign in</a></p>
        </div>

        <!-- Google -->
        <button class="btn-google" (click)="onGoogleSignup()">
            <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                    fill="#4285F4" />
                <path
                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                    fill="#34A853" />
                <path
                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                    fill="#FBBC05" />
                <path
                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                    fill="#EA4335" />
            </svg>
            Continue with Google
        </button>

        <div class="divider">
            <span></span>
            <p>or sign up with</p>
            <span></span>
        </div>

        <form (ngSubmit)="onSignup()" #signupForm="ngForm">

            <!-- Full Name -->
            <div class="field-group">
                <label>Full Name</label>
                <div class="input-wrap">
                    <span class="material-icons field-icon-left">person</span>
                    <input type="text" name="fullName" [(ngModel)]="fullName" placeholder="faizal hassan" autocomplete="name"
                        required />
                </div>
            </div>

            <!-- Email / Phone -->
            <div class="field-group">
                <label>Email or Phone</label>
                <div class="input-wrap">
                    <span class="material-icons field-icon-left">alternate_email</span>
                    <input type="text" name="email" [(ngModel)]=" email" placeholder="you@email.com or 03001234567"
                        autocomplete="username" required />
                </div>
            </div>

            <!-- Password -->
            <div class="field-group">
                <label>Password</label>
                <div class="input-wrap">
                    <span class="material-icons field-icon-left">lock</span>
                    <input [type]="showPassword ? 'text' : 'password'" name="password" [(ngModel)]="password"
                        placeholder="Min. 8 characters" autocomplete="new-password" required />
                    <button type="button" class="toggle-pw" (click)="togglePassword()">
                        <span class="material-icons">{{ showPassword ? 'visibility_off' : 'visibility' }}</span>
                    </button>
                </div>
                <!-- Strength bar -->
                <div class="strength-wrap" *ngIf="password">
                    <div class="strength-bar">
                        <div class="strength-fill" [class.weak]="passwordStrength === 'weak'"
                            [class.medium]="passwordStrength === 'medium'"
                            [class.strong]="passwordStrength === 'strong'"></div>
                    </div>
                    <span class="strength-label" [class.weak]="passwordStrength === 'weak'"
                        [class.medium]="passwordStrength === 'medium'" [class.strong]="passwordStrength === 'strong'">{{
                        strengthLabel }}</span>
                </div>
            </div>

            <!-- Confirm Password -->
            <div class="field-group">
                <label>Confirm Password</label>
                <div class="input-wrap" [class.error]="passwordMismatch">
                    <span class="material-icons field-icon-left">lock_reset</span>
                    <input [type]="showConfirmPassword ? 'text' : 'password'" name="confirmPassword"
                        [(ngModel)]="confirmPassword" placeholder="Re-enter your password" autocomplete="new-password"
                        required />
                    <button type="button" class="toggle-pw" (click)="toggleConfirmPassword()">
                        <span class="material-icons">{{ showConfirmPassword ? 'visibility_off' : 'visibility'
                            }}</span>
                    </button>
                </div>
                <p class="error-msg" *ngIf="passwordMismatch">
                    <span class="material-icons" style="font-size:13px;vertical-align:middle;">error_outline</span>
                    Passwords do not match
                </p>
            </div>

            <!-- Terms -->
            <div class="field-group terms-group">
                <label class="remember">
                    <input type="checkbox" name="agreeTerms" [(ngModel)]="agreeTerms" />
                    <span class="checkmark"></span>
                    I agree to the <a href="#">Terms & Privacy</a>
                </label>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn-signup" [disabled]="isLoading || !formValid">
                <span class="material-icons btn-icon" *ngIf="!isLoading">person_add</span>
                <span class="material-icons btn-icon spinning" *ngIf="isLoading">autorenew</span>
                {{ isLoading ? 'Creating account...' : 'Create account' }}
            </button>

        </form>

    </div>

</div>
